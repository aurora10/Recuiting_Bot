name: Build, Push & Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image (ARM64)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: aurora1010/recruiter-bot:latest
          platforms: linux/arm64
          cache-from: type=registry,ref=aurora1010/recruiter-bot:buildcache
          cache-to: type=registry,ref=aurora1010/recruiter-bot:buildcache,mode=max

      - name: Copy docker-compose.yml to VPS
        uses: appleboy/scp-action@v0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: docker-compose.yml
          target: /srv/recruiter_bot/

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /srv/recruiter_bot

            # Stop all running containers (avoids duplicates)
            docker compose down

            # Pull latest Docker image
            docker compose pull

            # Start fresh container
            docker compose up -d

            # Clean up old images
            docker image prune -f

            echo "Deploy complete — container status:"
            docker compose ps
