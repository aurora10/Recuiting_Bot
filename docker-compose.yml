services:
  recruiter-bot:
    image: aurora1010/recruiter-bot:latest
    container_name: recruiter_bot
    restart: on-failure:5
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"