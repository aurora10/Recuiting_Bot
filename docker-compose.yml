services:
  recruiter-bot:
    image: aurora1010/recruiter-bot:latest
    container_name: recruiter_bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - TZ=Europe/Paris
    volumes:
      - ./data:/app/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"